<!DOCTYPE html>
<html>
<head>
<title>Waffel Geburtstag</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#fff3d6;
}

.card{
  background:white;
  padding:30px;
  margin:40px auto;
  width:400px;
  border-radius:20px;
}

button{
  padding:10px 20px;
  margin:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="card">

<h1>🧇 Waffel Geburtstag!</h1>

<p>Ich werde ein Jahr älter und lade dich zum Waffeln essen ein.</p>

<p><b>Datum:</b> 12. April</p>
<p><b>Uhrzeit:</b> 15:00</p>

<h2 id="countdown"></h2>

<h3>Kommst du?</h3>

<button onclick="answer('yes')">Ja 😋</button>
<button onclick="answer('no')">Leider nicht 😢</button>

<p id="response"></p>

</div>

<script>

let birthday = new Date("Apr 12, 2026 15:00:00").getTime();

setInterval(function(){

let now = new Date().getTime();
let diff = birthday - now;

let days = Math.floor(diff/(1000*60*60*24));

document.getElementById("countdown").innerHTML =
"Nur noch " + days + " Tage bis zu den Waffeln!";

},1000);

function answer(a){

if(a=="yes"){
document.getElementById("response").innerHTML="Yay! 🧇";
}

if(a=="no"){
document.getElementById("response").innerHTML="Schade 😢";
}

}

</script>

</body>
</html>
