<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dial-a-Waffle</title>

<style>

body{
font-family: "Times New Roman", serif;
background:white;
text-align:center;
margin-top:80px;
}

h1{
font-weight:normal;
}

#screen{
border:1px solid black;
width:200px;
margin:20px auto;
padding:10px;
font-size:24px;
letter-spacing:3px;
}

.pad{
width:200px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
}

button{
padding:12px;
font-size:18px;
border:1px solid black;
background:white;
cursor:pointer;
}

button:hover{
background:#eee;
}

.info{
margin-top:40px;
font-size:18px;
}

</style>
</head>

<body>

<h1>Dial-a-Waffle</h1>

<p>Enter the code to access the birthday invitation</p>

<div id="screen"></div>

<div class="pad">
<button onclick="add(1)">1</button>
<button onclick="add(2)">2</button>
<button onclick="add(3)">3</button>

<button onclick="add(4)">4</button>
<button onclick="add(5)">5</button>
<button onclick="add(6)">6</button>

<button onclick="add(7)">7</button>
<button onclick="add(8)">8</button>
<button onclick="add(9)">9</button>

<button onclick="clearNum()">C</button>
<button onclick="add(0)">0</button>
<button onclick="call()">call</button>
</div>

<div class="info" id="result"></div>

<script>

let number="";

function add(n){
number += n;
document.getElementById("screen").innerText=number;
}

function clearNum(){
number="";
document.getElementById("screen").innerText="";
}

function call(){

if(number=="123"){
document.getElementById("result").innerHTML=
`
<h2>🧇 Birthday Waffle Party</h2>
<p>12 April – 15:00</p>
<p>Come eat waffles!</p>
<p>Location: my place</p>
`;
}

else{
document.getElementById("result").innerHTML=
"Number not found.";
}

}

</script>

</body>
</html>
