<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>waffle invitation</title>

<style>

body{
font-family:"Times New Roman",serif;
background:white;
text-align:center;
margin-top:60px;
}

h1{
font-weight:normal;
}

.grid{
width:300px;
margin:40px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.square{
border:1px solid black;
padding:40px 10px;
cursor:pointer;
}

.square:hover{
background:#f5f5f5;
}

#content{
margin-top:40px;
max-width:400px;
margin-left:auto;
margin-right:auto;
font-size:18px;
}

#waffle{
font-size:40px;
margin:20px;
}

button{
border:1px solid black;
background:white;
padding:6px 10px;
cursor:pointer;
}

</style>

</head>
<body>

<h1>waffle birthday</h1>

<div id="waffle">🧇</div>
<button onclick="generate()">generate waffle</button>

<div class="grid">

<div class="square" onclick="show('info')">
when / why
</div>

<div class="square" onclick="show('address')">
address
</div>

<div class="square" onclick="show('rsvp')">
rsvp
</div>

<div class="square" onclick="show('toppings')">
toppings
</div>

</div>

<div id="content"></div>

<script>

function show(type){

let c=document.getElementById("content");

if(type=="info"){
c.innerHTML=`
<p><b>waffle birthday</b></p>
<p>12 april</p>
<p>15:00</p>
<p>come eat waffles</p>
`;
}

if(type=="address"){
c.innerHTML=`
<p>street name 12</p>
<p>city</p>
<button onclick="window.open('https://maps.google.com')">
open map
</button>
`;
}

if(type=="rsvp"){
c.innerHTML=`
<p>are you coming?</p>
<button onclick="reply('yes')">yes</button>
<button onclick="reply('no')">no</button>
<p id="answer"></p>
`;
}

if(type=="toppings"){
c.innerHTML=`
<p>choose toppings</p>

<label><input type="checkbox"> strawberries 🍓</label><br>
<label><input type="checkbox"> banana 🍌</label><br>
<label><input type="checkbox"> chocolate 🍫</label><br>
<label><input type="checkbox"> powdered sugar ❄️</label><br>
<label><input type="checkbox"> vegan cream 🌱</label>
`;
}

}

function reply(r){
document.getElementById("answer").innerText="thanks!";
}

function generate(){

let toppings=[
"🍓","🍌","🍫","🍯","🫐","🍦"
];

let amount=Math.floor(Math.random()*3)+1;

let waffle="🧇 ";

for(let i=0;i<amount;i++){

waffle+=toppings[Math.floor(Math.random()*toppings.length)]+" ";

}

document.getElementById("waffle").innerText=waffle;

}

</script>

</body>
</html>
