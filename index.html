<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🧇 Waffel Geburtstag</title>

<style>

body{
font-family: Arial;
background: linear-gradient(#fff3d6,#ffe8b0);
text-align:center;
margin:0;
}

.card{
background:white;
width:420px;
margin:40px auto;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin:8px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:#ffb347;
}

button:hover{
transform:scale(1.05);
}

#waffle{
font-size:40px;
margin:20px;
}

.confetti{
position:fixed;
width:10px;
height:10px;
background:red;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}

</style>
</head>

<body>

<div class="card">

<h1>🧇 Waffel Geburtstag</h1>

<p>Ich lade dich zum Waffeln essen ein!</p>

<p><b>Datum:</b> 12. April</p>
<p><b>Uhrzeit:</b> 15:00</p>
<p><b>Ort:</b> Bei mir zuhause</p>

<h2 id="countdown"></h2>

<hr>

<h3>Kommst du?</h3>

<button onclick="rsvp(true)">Ja 😋</button>
<button onclick="rsvp(false)">Leider nicht 😢</button>

<p id="answer"></p>

<hr>

<h3>Baue deine Waffel</h3>

<div id="waffle">🧇</div>

<button onclick="generateWaffle()">Zufällige Waffel</button>

<p id="toppings"></p>

<hr>

<h3>Lieblings-Toppings</h3>

<label><input type="checkbox"> Erdbeeren 🍓</label><br>
<label><input type="checkbox"> Banane 🍌</label><br>
<label><input type="checkbox"> Schokolade 🍫</label><br>
<label><input type="checkbox"> Puderzucker ❄️</label><br>
<label><input type="checkbox"> Vegane Sahne 🌱</label><br>

<hr>

<button onclick="openMap()">📍 Ort öffnen</button>

</div>

<script>

let birthday = new Date("Apr 12, 2026 15:00:00").getTime();

setInterval(function(){

let now = new Date().getTime();
let diff = birthday - now;

let days = Math.floor(diff/(1000*60*60*24));
let hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));

document.getElementById("countdown").innerHTML =
"⏳ Noch "+days+" Tage und "+hours+" Stunden";

},1000);

function rsvp(coming){

if(coming){

document.getElementById("answer").innerHTML =
"Yay! Freue mich! 🧇";

confetti();

}else{

document.getElementById("answer").innerHTML =
"Schade 😢";

}

}

function generateWaffle(){

let toppings = ["🍓","🍌","🍫","🍯","🫐","🍦"];

let amount = Math.floor(Math.random()*3)+1;

let result="🧇 ";

for(let i=0;i<amount;i++){

result+=toppings[Math.floor(Math.random()*toppings.length)]+" ";

}

document.getElementById("toppings").innerHTML=result;

}

function confetti(){

for(let i=0;i<40;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
"hsl("+Math.random()*360+",100%,50%)";

c.style.animationDuration=
Math.random()*2+2+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);

}

}

function openMap(){

window.open("https://maps.google.com");

}

</script>

</body>
</html>
