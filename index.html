<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>einladung</title>

<style>

body{
font-family:"Times New Roman",serif;
background:white;
text-align:center;
margin-top:60px;
}

h1{
font-weight:normal;
}

.grid{
width:300px;
margin:40px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.square{
border:1px solid black;
padding:40px 10px;
cursor:pointer;
}

.square:hover{
background:#F7FFF5;
}

#content{
margin-top:40px;
max-width:400px;
margin-left:auto;
margin-right:auto;
font-size:18px;
}

#waffle{
font-size:40px;
margin:20px;
}

button{
border:1px solid black;
background:white;
padding:6px 10px;
cursor:pointer;
}

</style>

</head>
<body>

<h1>vegane waffel party</h1>

<div id="waffle">🧇</div>
<button onclick="generate()">generate waffle</button>

<div class="grid">

<div class="square" onclick="show('info')">
wann
</div>

<div class="square" onclick="show('address')">
wo
</div>

<div class="square" onclick="show('rsvp')">
rsvp
</div>

<div class="square" onclick="show('toppings')">
toppings
</div>

</div>

<div id="content"></div>

<script>

function show(type){

let c=document.getElementById("content");

if(type=="info"){
c.innerHTML=`
<p><b>lauris geburtstag</b></p>
<p>14. märz</p>
<p>ab 11:00</p>
<p>komm vorbei zum waffeln essen, ich freu mich <3</p>
`;
}

if(type=="address"){
c.innerHTML=`
<p>rumpffsweg 11</p>
<p>hamburg</p>
<button onclick="window.open('https://www.google.com/maps/place/Rumpffsweg+11,+20537+Hamburg/@53.5541358,10.0519738,16z/data=!3m1!4b1!4m6!3m5!1s0x47b18ea1f163ba29:0x3be23f125ff13104!8m2!3d53.5541326!4d10.0545487!16s%2Fg%2F11c227_rh4?entry=ttu&g_ep=EgoyMDI2MDMwNS4wIKXMDSoASAFQAw%3D%3D')">
karte öffnen
</button>
`;
}

if(type=="rsvp"){
c.innerHTML=`
<p>kommst du vorbei?</p>
<button onclick="reply('ja')">ja</button>
<button onclick="reply('nein')">nein</button>
<p id="answer"></p>
`;
}

if(type=="toppings"){
c.innerHTML=`
<p>wähle deine toppings</p>

<label><input type="checkbox"> erdbeeren 🍓</label><br>
<label><input type="checkbox"> bananen 🍌</label><br>
<label><input type="checkbox"> nutella 🍫</label><br>
<label><input type="checkbox"> puderzucker ❄️</label><br>
<label><input type="checkbox"> käse 🧀</label><br>
<label><input type="checkbox"> apfelmus 🍎</label>
`;
}

}

function reply(r){
document.getElementById("answer").innerText="thanks!";
}

function generate(){

let toppings=[
"🍓","🍌","🍫","🍦","🧀","🍎","🥑"
];

let amount=Math.floor(Math.random()*3)+1;

let waffle="🧇 ";

for(let i=0;i<amount;i++){

waffle+=toppings[Math.floor(Math.random()*toppings.length)]+" ";

}

document.getElementById("waffle").innerText=waffle;

}

</script>

</body>
</html>
